[tool.uv.workspace]
members = ["python/*"]

[dependency-groups]
dev = [
    "prek",
    { include-group = "type-check" },
    { include-group = "lint" },
    { include-group = "test" },
]
type-check = ["mypy", "types-pyaudio"]
lint = ["ruff"]
test = ["pytest", "pytest-cov", "pytest-xdist", "pytest-unused-fixtures"]

[tool.pylint.messages_control]
disable = [
    "line-too-long",
    "missing-function-docstring",
    "missing-class-docstring",
]

[tool.ruff]
target-version = "py312"
line-length = 115

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "ANN",    # I don't like these
    "COM812", # recommended to ignore by formatter
    "ISC001", # recommended to ignore by formatter
    "E501",   # ruff format handles line length
    "D100",   # Don't plan on including module-level docstrings
    "D102",   # Don't plan on including module-level docstrings
    "D103",   # Don't plan on including module-level docstrings
    "D203",   # Incompatible with D211 and ruff format
    "D213",   # Incompatible with D212
    "D400",   # I don't care for this docstring formatting nitpick
    "D415",   # I don't care for this docstring formatting nitpick
    "FBT002", # Disagree
    "T201",   # Disagree
]

[tool.ruff.lint.extend-per-file-ignores]
"**/tests/**/*.py" = [
    "S101",    # asserts allowed in tests...
    "ARG",     # Unused function args -> fixtures nevertheless are functionally relevant...
    "FBT",     # Don't care about booleans as positional arguments in tests, e.g. via @pytest.mark.parametrize()
    "PLR2004", # Magic value used in comparison, ...
    "S311",    # Standard pseudo-random generators are not suitable for cryptographic purposes
    "D103",    # I don't like docstrings *that* much
    "INP001",  # tests don't need to be a module
]
"**/scripts/**/*.py" = [
    "INP001",  # scripts aren't importable modules, they're runnable files
    "T201",    # print() is the whole point of example / usage scripts
]

[tool.ruff.lint.pylint]
max-args = 6

[tool.mypy]
files = ["."]
exclude = ["build/"]
strict = true
explicit_package_bases = true
